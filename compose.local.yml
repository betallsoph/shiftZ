name: shiftz

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shiftbot
      POSTGRES_PASSWORD: shiftbot
      POSTGRES_DB: shiftbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftbot -d shiftbot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
