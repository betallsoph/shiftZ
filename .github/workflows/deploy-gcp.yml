name: Deploy GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shiftz-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, migrate, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build static production binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o shiftz ./cmd/app
          file shiftz

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiftz-linux-amd64-${{ github.sha }}
          path: shiftz
          if-no-files-found: error
          retention-days: 14

      - name: Set up Atlas
        uses: ariga/setup-atlas@v0

      - name: Apply database migrations
        env:
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          test -n "$MIGRATION_DATABASE_URL"
          atlas migrate apply \
            --dir file://migrations \
            --revisions-schema public \
            --url "$MIGRATION_DATABASE_URL"

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload binary
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          scp \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            shiftz "$DEPLOY_USER@$DEPLOY_HOST:shiftz.new"

      - name: Activate and verify binary
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'chmod 700 "$HOME/shiftz.new" && sudo /usr/local/sbin/shiftz-deploy'

      - name: Remove SSH credentials
        if: always()
        run: rm -rf "$HOME/.ssh"
