<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot — Đặt lại mật khẩu</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260716-25" />
    <script src="/static/dashboard.js?v=20260716-9" defer></script>
  </head>
  <body class="roomio-grid-bg auth-page">
    <header class="site-header auth-header">
      <h1 class="brand-heading">
        <a class="brand-link" href="/login" aria-label="ShiftBot">
          <img class="brand-logo" src="/static/shiftbot-logo.png?v=20260716-2" alt="ShiftBot" />
        </a>
      </h1>
    </header>
    <main class="container auth-container">
      <section class="auth-panel auth-reset-panel">
        <h2 class="auth-password-title">Đặt lại mật khẩu</h2>
        <p class="auth-password-subtitle">Nhập mật khẩu mới cho tài khoản dashboard.</p>
        <form method="post" action="/login/reset" class="control-form auth-password-form">
          <input type="hidden" name="token" value="{{.Token}}" />
          <label>
            Mật khẩu mới
            <input
              class="input"
              type="password"
              name="dashboard_password"
              autocomplete="new-password"
              minlength="6"
              required
              autofocus
            />
          </label>
          <label>
            Xác nhận mật khẩu
            <input
              class="input"
              type="password"
              name="dashboard_password_confirm"
              autocomplete="new-password"
              minlength="6"
              required
            />
          </label>
          {{if .Error}}
          <p class="auth-error" role="alert">{{.Error}}</p>
          {{end}}
          <div class="control-actions">
            <button type="submit" class="btn btn-primary">
              <span class="btn-label">Lưu mật khẩu</span>
            </button>
          </div>
        </form>
        <p class="auth-reset-back"><a href="/login">Quay lại đăng nhập</a></p>
      </section>
    </main>
  </body>
</html>
