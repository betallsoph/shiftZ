<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot — Đăng nhập</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <h1 class="brand-heading">
        <a class="brand-link" href="/login" aria-label="ShiftBot">
          <img class="brand-logo" src="/static/shiftbot-logo.png" alt="ShiftBot" />
        </a>
      </h1>
      <p>Đăng nhập bảng xếp lịch chủ quán</p>
    </header>
    <main class="container">
      <section class="controls card">
        {{if .Error}}
        <div class="alert alert-error"><strong>Lỗi</strong> — {{.Error}}</div>
        {{end}}
        <form method="post" action="/login" class="control-form">
          <label>
            Dashboard username
            <input
              class="input"
              type="text"
              name="dashboard_username"
              placeholder="demo.cafe"
              autocomplete="username"
              required
            />
          </label>
          <label>
            Mật khẩu được cấp
            <input
              class="input"
              type="password"
              name="owner_token"
              placeholder="sz_owner_..."
              autocomplete="current-password"
              required
            />
          </label>
          <div class="control-actions">
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
            {{if .SignupEnabled}}
            <a href="/signup" class="btn btn-ghost">Tạo quán mới</a>
            {{end}}
          </div>
        </form>
        <p class="meta"><a href="/login/legacy">Đăng nhập bằng mã cửa hàng (legacy)</a></p>
      </section>
    </main>
  </body>
</html>
