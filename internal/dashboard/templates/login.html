<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftZ — Đăng nhập</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <h1>shiftZ</h1>
      <p>Đăng nhập bảng xếp lịch chủ quán</p>
    </header>
    <main class="container">
      <section class="controls card">
        {{if .Error}}
        <div class="alert alert-error"><strong>Lỗi</strong> — {{.Error}}</div>
        {{end}}
        <form method="post" action="/login" class="control-form">
          <label>
            Mã cửa hàng
            <input
              class="input"
              type="text"
              name="shop_id"
              placeholder="uuid từ lệnh seed"
              autocomplete="off"
              required
            />
          </label>
          <label>
            Token chủ quán
            <input
              class="input"
              type="password"
              name="owner_token"
              placeholder="sz_owner_..."
              autocomplete="off"
              required
            />
          </label>
          <div class="control-actions">
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
