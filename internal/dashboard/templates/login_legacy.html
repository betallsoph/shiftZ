<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot — Đăng nhập legacy</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260716-3" />
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <h1 class="brand-heading">
        <a class="brand-link" href="/login" aria-label="ShiftBot">
          <img class="brand-logo" src="/static/shiftbot-logo.png?v=20260716-2" alt="ShiftBot" />
        </a>
      </h1>
      <p>Đăng nhập legacy (mã cửa hàng + token)</p>
    </header>
    <main class="container">
      <section class="controls card">
        {{if .Error}}
        <div class="alert alert-error"><strong>Lỗi</strong> — {{.Error}}</div>
        {{end}}
        <form method="post" action="/login/legacy" class="control-form">
          <label>
            Mã cửa hàng
            <input
              class="input"
              type="text"
              name="shop_id"
              placeholder="uuid"
              autocomplete="off"
              required
            />
          </label>
          <label>
            Token chủ quán
            <input
              class="input"
              type="password"
              name="owner_token"
              placeholder="sz_owner_..."
              autocomplete="off"
              required
            />
          </label>
          <div class="control-actions">
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
          </div>
        </form>
        <p class="meta"><a href="/login">Quay lại đăng nhập username</a></p>
      </section>
    </main>
  </body>
</html>
