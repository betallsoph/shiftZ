<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftZ — Tạo quán</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <h1>shiftZ</h1>
      <p>Tạo quán mới</p>
    </header>
    <main class="container">
      <section class="controls card">
        {{if .Error}}
        <div class="alert alert-error"><strong>Lỗi</strong> — {{.Error}}</div>
        {{end}}
        <form method="post" action="/signup" class="control-form">
          <label>
            Tên quán
            <input
              class="input"
              type="text"
              name="shop_name"
              value="{{.ShopName}}"
              placeholder="ví dụ: Cafe Hoa"
              autocomplete="organization"
              required
            />
          </label>
          <label>
            Múi giờ
            <select class="input" name="timezone">
              <option value="Asia/Ho_Chi_Minh" {{if eq .Timezone "Asia/Ho_Chi_Minh"}}selected{{end}}>Asia/Ho_Chi_Minh</option>
              <option value="UTC" {{if eq .Timezone "UTC"}}selected{{end}}>UTC</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input
              type="checkbox"
              name="create_default_shifts"
              value="on"
              {{if .CreateDefaultShifts}}checked{{end}}
            />
            Tạo ca mẫu (sáng 08:00–14:00, chiều 14:00–20:00 mỗi ngày)
          </label>
          <div class="control-actions">
            <button type="submit" class="btn btn-primary">Tạo quán</button>
            <a href="/login" class="btn btn-ghost">Đã có quán? Đăng nhập</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
