<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260716-3" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/dashboard.js?v=20260716-3" defer></script>
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <div class="header-row">
        <div>
          <h1 class="brand-heading">
            <a class="brand-link" href="/" aria-label="ShiftBot">
              <img class="brand-logo" src="/static/shiftbot-logo.png?v=20260716-2" alt="ShiftBot" />
            </a>
          </h1>
          <p>Bảng xếp lịch cho chủ quán{{if .ShopName}} — {{.ShopName}}{{end}}</p>
        </div>
        <form method="post" action="/logout" class="logout-form">
          <button type="submit" class="btn btn-ghost btn-sm">Đăng xuất</button>
        </form>
      </div>
    </header>
    <main class="container">
      {{template "telegram_setup.html" .Telegram}}
      {{template "shifts_panel.html" .Shifts}}
      {{template "employees_panel.html" .Employees}}
      <section class="controls card">
        <form id="week-form" class="control-form">
          <label>
            Tuần bắt đầu
            <input class="input" type="date" name="week_start" value="{{.Today}}" />
          </label>
          <div class="control-actions">
            <button
              type="button"
              class="btn btn-ghost"
              hx-get="/dashboard/week"
              hx-include="#week-form"
              hx-target="#week-panel"
              hx-swap="innerHTML"
            >
              Tải lịch
            </button>
            <button
              type="button"
              class="btn btn-primary"
              hx-post="/dashboard/generate"
              hx-include="#week-form"
              hx-target="#week-panel"
              hx-swap="innerHTML"
            >
              Tạo lịch
            </button>
          </div>
        </form>
      </section>
      <section id="week-panel" class="week-panel">
        {{template "empty.html" .}}
      </section>
    </main>
  </body>
</html>
