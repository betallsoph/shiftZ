<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftZ</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/dashboard.js" defer></script>
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <h1>shiftZ</h1>
      <p>Bảng xếp lịch cho chủ quán</p>
    </header>
    <main class="container">
      <section class="controls card">
        <form id="shop-form" class="control-form">
          <label>
            Mã cửa hàng
            <input
              class="input"
              type="text"
              name="shop_id"
              placeholder="dán uuid từ lệnh seed"
              autocomplete="off"
            />
          </label>
          <label>
            Tuần bắt đầu
            <input class="input" type="date" name="week_start" value="{{.Today}}" />
          </label>
          <div class="control-actions">
            <button
              type="button"
              class="btn btn-ghost"
              hx-get="/dashboard/week"
              hx-include="#shop-form"
              hx-target="#week-panel"
              hx-swap="innerHTML"
            >
              Tải lịch
            </button>
            <button
              type="button"
              class="btn btn-primary"
              hx-post="/dashboard/generate"
              hx-include="#shop-form"
              hx-target="#week-panel"
              hx-swap="innerHTML"
            >
              Tạo lịch
            </button>
          </div>
        </form>
      </section>
      <section id="week-panel" class="week-panel">
        {{template "empty.html" .}}
      </section>
    </main>
  </body>
</html>
