<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260716-26" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/dashboard.js?v=20260716-12" defer></script>
  </head>
  <body class="roomio-grid-bg dashboard-page">
    <header class="dashboard-topbar">
      <div class="dashboard-topbar-inner">
        <a class="brand-link" href="/" aria-label="ShiftBot">
          <img class="dashboard-logo" src="/static/shiftbot-logo.png?v=20260716-2" alt="ShiftBot" />
        </a>
        <div class="dashboard-account">
          {{if .IncidentReportEnabled}}
          <details class="incident-report">
            <summary class="text-button">Báo cáo sự cố</summary>
            <form
              class="incident-report-form"
              hx-post="/dashboard/incident-report"
              hx-target="#incident-report-status"
              hx-swap="innerHTML"
            >
              <label class="incident-report-field">
                <span>Mô tả (tuỳ chọn)</span>
                <textarea
                  class="input"
                  name="description"
                  rows="3"
                  maxlength="2000"
                  placeholder="Ví dụ: không tải được lịch tuần, bot không phản hồi..."
                ></textarea>
              </label>
              <div class="control-actions">
                <button type="submit" class="btn btn-ghost btn-sm">Gửi báo cáo</button>
              </div>
            </form>
            <div id="incident-report-status"></div>
          </details>
          {{end}}
          <form method="post" action="/logout" class="logout-form">
            <button type="submit" class="text-button">Đăng xuất</button>
          </form>
        </div>
      </div>
    </header>

    <main class="dashboard-container">
      <section class="dashboard-intro">
        <h1 class="dashboard-shop-title">{{.ShopName}}</h1>
      </section>

      <nav class="dashboard-tabs" aria-label="Điều hướng dashboard">
        <a href="#schedule-section" data-tab-link>Lịch tuần</a>
        <a href="#employees-panel" data-tab-link>Nhân viên</a>
        <a href="#shifts-panel" data-tab-link>Ca làm việc</a>
      </nav>

      <section id="schedule-section" class="dashboard-view is-active" data-dashboard-view="schedule">
        <h2 class="dashboard-section-title">Xếp lịch</h2>
        <div class="dashboard-tool schedule-workspace">
          <form id="week-form" class="week-toolbar">
            <label class="week-date-field">
              <span>Tuần bắt đầu</span>
              <input class="input" type="date" name="week_start" value="{{.Today}}" />
            </label>
            <div class="control-actions">
              <button
                type="button"
                class="btn btn-ghost"
                hx-get="/dashboard/week"
                hx-include="#week-form"
                hx-target="#week-panel"
                hx-swap="innerHTML"
              >
                Tải lịch
              </button>
              <button
                type="button"
                class="btn btn-primary"
                hx-post="/dashboard/generate"
                hx-include="#week-form"
                hx-target="#week-panel"
                hx-swap="innerHTML"
              >
                Tạo lịch
              </button>
            </div>
          </form>
          <section id="week-panel" class="week-panel">
            {{template "empty.html" .}}
          </section>
        </div>
      </section>

      {{template "employees_panel.html" .Employees}}
      {{template "shifts_panel.html" .Shifts}}
    </main>
  </body>
</html>
