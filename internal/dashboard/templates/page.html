<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260716-9" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/dashboard.js?v=20260716-4" defer></script>
  </head>
  <body class="roomio-grid-bg dashboard-page">
    <header class="dashboard-topbar">
      <div class="dashboard-topbar-inner">
        <a class="brand-link" href="/" aria-label="ShiftBot">
          <img class="dashboard-logo" src="/static/shiftbot-logo.png?v=20260716-2" alt="ShiftBot" />
        </a>
        <div class="dashboard-account">
          <form method="post" action="/logout" class="logout-form">
            <button type="submit" class="text-button">Đăng xuất</button>
          </form>
        </div>
      </div>
    </header>

    <main class="dashboard-container">
      {{if .InviteCode}}<section class="dashboard-intro">
        <div class="invite-code">
          <span>Mã mời nhân viên</span>
          <code>{{.InviteCode}}</code>
        </div>
      </section>{{end}}

      <nav class="dashboard-tabs" aria-label="Điều hướng dashboard">
        <a href="#schedule-section">Lịch tuần</a>
        <a href="#employees-panel">Nhân viên</a>
        <a href="#shifts-panel">Ca làm việc</a>
        <a href="#telegram-setup">Telegram</a>
      </nav>

      <section id="schedule-section" class="dashboard-tool schedule-workspace">
        <div class="panel-heading">
          <div>
            <h2>Xếp lịch</h2>
          </div>
        </div>
        <form id="week-form" class="week-toolbar">
          <label class="week-date-field">
            <span>Tuần bắt đầu</span>
            <input class="input" type="date" name="week_start" value="{{.Today}}" />
          </label>
          <div class="control-actions">
            <button
              type="button"
              class="btn btn-ghost"
              hx-get="/dashboard/week"
              hx-include="#week-form"
              hx-target="#week-panel"
              hx-swap="innerHTML"
            >
              Tải lịch
            </button>
            <button
              type="button"
              class="btn btn-primary"
              hx-post="/dashboard/generate"
              hx-include="#week-form"
              hx-target="#week-panel"
              hx-swap="innerHTML"
            >
              Tạo lịch
            </button>
          </div>
        </form>
        <section id="week-panel" class="week-panel">
          {{template "empty.html" .}}
        </section>
      </section>

      {{template "employees_panel.html" .Employees}}

      <div class="dashboard-settings-grid">
        {{template "shifts_panel.html" .Shifts}}
        {{template "telegram_setup.html" .Telegram}}
      </div>
    </main>
  </body>
</html>
