<section id="shifts-panel" class="dashboard-view{{if .IsActive}} is-active{{end}}" data-dashboard-view="shifts">
  <h2 class="dashboard-section-title">Ca làm việc</h2>
  <div class="dashboard-tool shifts-panel">
    {{if .Error}}
    <p class="panel-error" role="alert">{{.Error}}</p>
    {{end}}

    {{if .Shifts}}
    <ul class="shift-list">
      {{range .Shifts}}
      <li class="shift-row{{if not .IsActive}} is-inactive{{end}}">
        <div class="shift-meta">
          <span class="shift-weekday">{{.Weekday}}</span>
          <span class="shift-name">{{.Name}}</span>
          <span class="shift-time">{{.TimeRange}}</span>
          <span class="shift-staff">{{.MinStaff}}–{{.MaxStaff}} người</span>
        </div>
        <button
          type="button"
          class="status-toggle{{if .IsActive}} is-active{{end}}"
          role="switch"
          aria-checked="{{if .IsActive}}true{{else}}false{{end}}"
          aria-label="{{.Name}}: {{.StatusLabel}}"
          title="{{.StatusLabel}}"
          hx-post="/dashboard/shifts/{{.ID}}/{{if .IsActive}}deactivate{{else}}activate{{end}}"
          hx-target="#shifts-panel"
          hx-swap="outerHTML"
        ></button>
      </li>
      {{end}}
    </ul>
    {{else}}
    <div class="compact-empty-state">
      <p>Chưa có ca làm việc.</p>
    </div>
    {{end}}

    <details class="inline-editor" {{if .Error}}open{{end}}>
      <summary class="text-action">+ Thêm ca</summary>
      <form
        class="shift-form control-form editor-form"
        hx-post="/dashboard/shifts"
        hx-target="#shifts-panel"
        hx-swap="outerHTML"
      >
        <div class="shift-form-grid">
          <label>
            Tên ca
            <input class="input" type="text" name="name" value="{{.Form.Name}}" placeholder="Ca sáng" required />
          </label>
          <label>
            Thứ
            <div class="field-control select-field" data-custom-select>
              <select class="input select-input" name="weekday" data-custom-select-native>
                <option value="0" {{if eq .Form.Weekday 0}}selected{{end}}>Chủ nhật</option>
                <option value="1" {{if eq .Form.Weekday 1}}selected{{end}}>Thứ hai</option>
                <option value="2" {{if eq .Form.Weekday 2}}selected{{end}}>Thứ ba</option>
                <option value="3" {{if eq .Form.Weekday 3}}selected{{end}}>Thứ tư</option>
                <option value="4" {{if eq .Form.Weekday 4}}selected{{end}}>Thứ năm</option>
                <option value="5" {{if eq .Form.Weekday 5}}selected{{end}}>Thứ sáu</option>
                <option value="6" {{if eq .Form.Weekday 6}}selected{{end}}>Thứ bảy</option>
              </select>
            </div>
          </label>
          <label>
            Bắt đầu
            <input class="input" type="time" name="start_time" value="{{.Form.StartTime}}" required />
          </label>
          <label>
            Kết thúc
            <input class="input" type="time" name="end_time" value="{{.Form.EndTime}}" required />
          </label>
          <label>
            Tối thiểu
            <div class="field-control number-field" data-number-field>
              <input class="input" type="number" name="min_staff" min="0" value="{{.Form.MinStaff}}" required />
              <div class="number-steppers" aria-hidden="true">
                <button type="button" class="number-step" data-number-step="1" tabindex="-1">▲</button>
                <button type="button" class="number-step" data-number-step="-1" tabindex="-1">▼</button>
              </div>
            </div>
          </label>
          <label>
            Tối đa
            <div class="field-control number-field" data-number-field>
              <input class="input" type="number" name="max_staff" min="1" value="{{.Form.MaxStaff}}" required />
              <div class="number-steppers" aria-hidden="true">
                <button type="button" class="number-step" data-number-step="1" tabindex="-1">▲</button>
                <button type="button" class="number-step" data-number-step="-1" tabindex="-1">▼</button>
              </div>
            </div>
          </label>
        </div>
        <div class="control-actions">
          <button type="submit" class="btn btn-primary btn-sm">Lưu ca</button>
        </div>
      </form>
    </details>
  </div>
</section>
