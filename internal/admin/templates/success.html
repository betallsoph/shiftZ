<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shiftbot — {{.Title}}</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body class="roomio-grid-bg">
    <header class="site-header">
      <h1 class="brand-heading">
        <a class="brand-link" href="/admin" aria-label="ShiftBot Admin">
          <img class="brand-logo" src="/static/shiftbot-logo.png" alt="ShiftBot" />
        </a>
        <span class="brand-context">Admin</span>
      </h1>
      <p>{{.Title}}</p>
    </header>
    <main class="container">
      <section class="controls card">
        <div class="alert alert-notice">
          <strong>Lưu ý</strong> — Mật khẩu được cấp chỉ hiển thị một lần. Sao chép ngay trước khi rời trang.
        </div>
        <dl class="credential-list">
          <div class="credential-row">
            <dt>Dashboard username</dt>
            <dd><code>{{.Username}}</code></dd>
          </div>
          <div class="credential-row">
            <dt>Mật khẩu được cấp</dt>
            <dd><code>{{.OwnerToken}}</code></dd>
          </div>
          <div class="credential-row">
            <dt>Shop ID</dt>
            <dd><code>{{.ShopID}}</code></dd>
          </div>
          <div class="credential-row">
            <dt>Mã mời nhân viên</dt>
            <dd><code>{{.InviteCode}}</code></dd>
          </div>
        </dl>
        <div class="control-actions">
          <a href="{{.BackURL}}" class="btn btn-primary">Về admin</a>
        </div>
      </section>
    </main>
  </body>
</html>
